<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Learning</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

    <nav class="navbar">
        <h2 class="logo">Eestiazo</h2>
        <div>
            <button onclick="openAuth('login')">Login</button>
            <button class="primary" onclick="openAuth('register')">Get Started</button>
        </div>
    </nav>

    <section class="hero">
        <h1>Learn without distraction</h1>
        <p>Search videos and code. Stay focused. Build real skills.</p>

        <div class="search-box">
            <input id="search-input" placeholder="Search a topic...">
            <button onclick="handleSearch()">Search</button>
        </div>
    </section>

    <section id="results-section" class="hidden">

        <div class="tabs">
            <button id="tab-videos" class="active" onclick="switchTab('videos')">Videos</button>
            <button id="tab-repos" onclick="switchTab('repos')">Repositories</button>
        </div>
            
            <select id="sort-select" class="hidden" onchange="applySort()"></select>
            </div>

        <div id="videos-container">
            </div>
        <div id="repos-container" class="hidden"></div>
        <div id="pagination-controls" class="hidden" style="text-align: center; margin-top: 20px; padding-bottom: 40px;">
            <button id="prev-btn" onclick="changePage(-1)">Previous</button>
            <span id="page-info" style="margin: 0 15px; font-weight: bold;">Page 1</span>
            <button id="next-btn" onclick="changePage(1)">Next</button>
        </div>
    </section>

    <div id="auth-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close" onclick="closeAuth()">&times;</span>

            <div id="login-form">
                <h3>Login</h3>
                <input placeholder="Username">
                <input type="password" placeholder="Password">
                <button>Login</button>
            </div>

            <div id="register-form" class="hidden">
                <h3>Register</h3>
                <input placeholder="Username">
                <input placeholder="Email">
                <input type="password" placeholder="Password">
                <button>Create account</button>
            </div>
        </div>
    </div>

<div id="video-modal" class="modal">
    <span class="close-video" onclick="closeVideo()">&times;</span>
    
    <div class="video-container">
        <iframe id="video-player" src="" frameborder="0" allowfullscreen></iframe>
    </div>
</div>

    <script src="js/app.js"></script>
</body>
</html>
